<!DOCTYPE html>
<html>

<head>
    <title>Products</title>
</head>

<body>

    <h1>Products</h1>

    <div style="display:flex; flex-wrap:wrap; gap:20px;">

        {% for product in products %}

        <div style="border:1px solid black; padding:10px; width:250px; text-align:center;">

            <h2>{{ product[1] }}</h2>

            <h3>₹ {{ product[3] }}</h3>

            <p>Stock : {{ product[2] }}</p>

            <img src="{{ url_for('static', filename='images/products/' + product[4]) }}" width="180">

        </div>

        {% endfor %}

    </div>

</body>

</html>
