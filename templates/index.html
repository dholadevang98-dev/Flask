<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
            font-size:30px;
            font-weight:bold;
            letter-spacing:2px;
        }

        .container{
            width:90%;
            margin:auto;
            padding:30px 0;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0px 5px 15px rgba(0,0,0,.2);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:15px;
            text-align:center;
        }

        .content h2{
            margin-bottom:10px;
            color:#333;
        }

        .price{
            color:green;
            font-size:24px;
            font-weight:bold;
            margin:10px 0;
        }

        .stock{
            color:#555;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#007bff;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }
    </style>

</head>

<body>

<header>
    🛒 My Store
</header>

<div class="container">

    <div class="products">

        {% for product in products %}

        <div class="card">

            <img src="{{ url_for('static', filename='images/products/' ~ product[3]) }}">

            <div class="content">

                <h2>{{ product[1] }}</h2>

                <div class="price">
                    ₹ {{ product[2] }}
                </div>

                <div class="stock">
                    Stock : {{ product[4] }}
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
