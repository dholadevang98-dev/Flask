<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>
</head>

<body>

    <h1 align="center">My Cart</h1>

    <table border="1" cellpadding="10" align="center">

        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>

        {% for product in products %}

        <tr>

            <td>
                <img src="{{ url_for('static', filename='images/products/' + product[3]) }}" width="100">
            </td>

            <td>{{ product[1] }}</td>

            <td>₹{{ product[2] }}</td>

            <td>{{ product[4] }}</td>

            <td>₹{{ product[2] * product[4] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
